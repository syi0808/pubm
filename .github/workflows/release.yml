name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write

jobs:
  release:
    if: startsWith(github.event.head_commit.message, 'Version Packages')
    environment: Publish
    permissions:
      contents: write
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-
      - uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          registry-url: https://registry.npmjs.org/
      - name: Install rcodesign (ad-hoc sign darwin binaries)
        run: |
          curl -fsSL "https://github.com/indygreg/apple-platform-rs/releases/download/apple-codesign%2F0.27.0/apple-codesign-0.27.0-x86_64-unknown-linux-musl.tar.gz" \
            | tar xz --strip-components=1 -C /usr/local/bin apple-codesign-0.27.0-x86_64-unknown-linux-musl/rcodesign
      - run: bun install --frozen-lockfile
      - run: bun run build
      - name: Publish and release
        run: bunx pubm --mode ci --phase publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
          JSR_TOKEN: ${{ secrets.JSR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBM_BREW_GITHUB_TOKEN: ${{ secrets.PUBM_BREW_GITHUB_TOKEN }}
